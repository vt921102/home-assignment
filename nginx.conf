# ============================================================
# Nginx — reverse proxy + load balancer
# Used with: docker compose --profile multi-instance up --scale app=3
# ============================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {

    # --------------------------------------------------------
    # Upstream — round-robin across app instances
    # --------------------------------------------------------
    upstream flash_sale_backend {
        # Docker Compose DNS resolves "app" to all scaled instances
        server app:8080;

        keepalive 32;
    }

    # --------------------------------------------------------
    # Rate limiting zones
    # --------------------------------------------------------
    limit_req_zone $binary_remote_addr
        zone=api_limit:10m rate=100r/s;

    # --------------------------------------------------------
    # Logging format
    # --------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # --------------------------------------------------------
    # Server
    # --------------------------------------------------------
    server {
        listen 80;
        server_name localhost;

        # Request size limit — 1 MB
        client_max_body_size 1m;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # --------------------------------------------------------
        # Security headers
        # --------------------------------------------------------
        add_header X-Frame-Options         DENY           always;
        add_header X-Content-Type-Options  nosniff        always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Referrer-Policy         no-referrer    always;

        # --------------------------------------------------------
        # API routes
        # --------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=200 nodelay;

            proxy_pass         http://flash_sale_backend;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
        }

        # --------------------------------------------------------
        # Swagger UI + OpenAPI
        # --------------------------------------------------------
        location ~ ^/(swagger-ui|v3/api-docs) {
            proxy_pass         http://flash_sale_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   Connection "";
        }

        # --------------------------------------------------------
        # Actuator health — internal only
        # --------------------------------------------------------
        location /actuator/health {
            proxy_pass         http://flash_sale_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # Block all other actuator endpoints from external access
        location /actuator/ {
            return 403;
        }

        # --------------------------------------------------------
        # Default
        # --------------------------------------------------------
        location / {
            return 404;
        }
    }
}