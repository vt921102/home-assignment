spring:
  application:
    name: flash-sale-be

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/flashsale}
    username: ${DB_USERNAME:app}
    password: ${DB_PASSWORD:app_password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 300000
      max-lifetime: 600000
      auto-commit: false

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          time_zone: Asia/Ho_Chi_Minh
        order_inserts: true
        order_updates: true
        connection.provider_disables_autocommit: true
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 2000
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 4

  cache:
    type: redis

  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: Asia/Ho_Chi_Minh
    default-property-inclusion: non_null

server:
  port: 8080
  tomcat:
    threads:
      max: 200
    accept-count: 100

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

app:
  jwt:
    issuer: flash-sale-backend
    access-token-ttl: PT15M
    refresh-token-ttl: P7D
    keystore-path: ${JWT_KEYSTORE_PATH:keys/jwt.p12}
    keystore-password: ${JWT_KEYSTORE_PASSWORD}
    key-alias: ${JWT_KEY_ALIAS:jwt-signing}
  otp:
    length: 6
    ttl: PT5M
    pepper: ${OTP_HASH_PEPPER}
    max-attempts: 5
    resend-limit: 5
    resend-window: PT1H
  rate-limit:
    login:
      limit: 5
      window: PT15M
    otp:
      limit: 5
      window: PT1H
    purchase:
      limit: 10
      window: PT1M
  flash-sale:
    cache-ttl: PT2S
    purchase-retry:
      max-attempts: 3
      initial-delay: PT0.05S
      multiplier: 1.5